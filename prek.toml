# See: https://prek.j178.dev/configuration/

[[repos]]
repo = "builtin"
hooks = [
  { id = "detect-private-key" },
  { id = "check-json" },
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
]

[[repos]]
# Use local .venv version to ensure the same version of tools for all developers and CI
# Language is "system" instead of "python" to prevent prek from creating a second venv, which would be redundant and could cause issues with native dependencies
repo = "local"
hooks = [
  { id = "ruff-check", name = "ruff-check", entry = "uv run --frozen ruff check --fix", language = "system", types = ["python"] },
  { id = "ruff-format", name = "ruff-format", entry = "uv run --frozen ruff format", language = "system", types = ["python"] },
  # ty is a whole-program checker — a change in src/ can cause a type error in tests/ etc
  # It must always run against the full codebase, not just the staged files. See https://github.com/astral-sh/ty/issues/269#issuecomment-3669333114
  { id = "ty-check", name = "ty check", entry = "uv run --frozen ty check", language = "system", types=["python"], pass_filenames = false, always_run = true },
  { id = "no-noqa", name = "restricted noqa comments", entry = "bash -c 'grep -rn \"noqa\" --include=\"*.py\" --exclude-dir=.venv | grep -v \"noqa: S603\" && echo \"ERROR: noqa suppression comment detected for an error other than S603; fix the root issue in a way that improves code quality instead of suppressing it\" && exit 1 || exit 0' --", language = "system", types = ["python"], pass_filenames = false },
]
