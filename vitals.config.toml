# vitals.config.toml
#
# Non-secret params (dataset names, selectors, URLs) are stored plainly here.
# Secrets (tokens, keys) are referenced as env var names (e.g. "${AXIOM_TOKEN}")
# and injected at runtime via: op run --env-file=secrets.env -- next dev
# See secrets.env.example for the expected env vars and their op:// paths.
#
# GCP: no secrets needed when using Application Default Credentials (ADC)
# Axiom: requires AXIOM_TOKEN (see secrets.env.example)

[[projects]]
id = "pilots"
name = "Pilots"

  [[projects.panels]]
  type = "errors"
  source = "axiom"

  [projects.panels.params]
  dataset = "pilots"
  token = "${AXIOM_TOKEN}"

